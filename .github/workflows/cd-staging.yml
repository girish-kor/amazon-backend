name: CD-Staging

on:
  push:
    branches: [develop]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: password
      redis:
        image: redis:7-alpine
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:integration

  build-and-push:
    runs-on: ubuntu-latest
    needs: integration-tests
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          services=("auth" "catalog" "inventory" "cart" "order" "payment" "search" "gateway")
          for service in "${services[@]}"; do
            docker buildx build \
              --push \
              --tag ghcr.io/${{ github.repository_owner }}/$service:${{ github.sha }} \
              --tag ghcr.io/${{ github.repository_owner }}/$service:latest \
              --file services/$service-service/Dockerfile \
              services/$service-service/
          done

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
      - uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
      - run: |
          helm upgrade --install ecommerce infra/k8s \
            --namespace ecommerce-staging \
            --values infra/k8s/values.staging.yaml \
            --set image.tag=${{ github.sha }}
