openapi: 3.1.0
info:
  title: Inventory Service API
  version: 1.0.0
  description: Stock management, reservations, and inventory operations

servers:
  - url: http://localhost:3003
    description: Local development
  - url: https://api.example.com/inventory
    description: Production

tags:
  - name: Inventory
    description: Stock level and availability queries
  - name: Reservations
    description: Inventory reservation operations
  - name: Restock
    description: Admin inventory adjustments

paths:
  /{productId}:
    get:
      tags:
        - Inventory
      summary: Get current inventory level for a product
      operationId: getInventory
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Inventory retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
        '404':
          description: Product not found in inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /reserve:
    post:
      tags:
        - Reservations
      summary: Reserve inventory for an order (idempotent)
      operationId: reserveInventory
      security:
        - ServiceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReserveRequest'
      responses:
        '201':
          description: Inventory reserved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Insufficient inventory available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /commit:
    post:
      tags:
        - Reservations
      summary: Commit a reservation to actual deduction (called after payment)
      operationId: commitReservation
      security:
        - ServiceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
              properties:
                orderId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Reservation committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Reservation cannot be committed (invalid state)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /release:
    post:
      tags:
        - Reservations
      summary: Release a reservation (restore stock)
      operationId: releaseReservation
      security:
        - ServiceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
              properties:
                orderId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Reservation released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restock:
    put:
      tags:
        - Restock
      summary: Add stock to inventory (admin only)
      operationId: restockInventory
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: string
                  format: uuid
                quantity:
                  type: integer
                  minimum: 1
                reason:
                  type: string
                  enum: [restock, adjustment, return]
                  default: restock
      responses:
        '200':
          description: Inventory updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (admin role required)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found in inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    InventoryResponse:
      type: object
      required:
        - productId
        - quantityAvailable
        - quantityReserved
        - quantityCommitted
        - updatedAt
      properties:
        productId:
          type: string
          format: uuid
        quantityAvailable:
          type: integer
          description: Available quantity (not reserved)
          minimum: 0
          example: 45
        quantityReserved:
          type: integer
          description: Quantity reserved by pending orders
          minimum: 0
          example: 5
        quantityCommitted:
          type: integer
          description: Quantity committed and deducted
          minimum: 0
          example: 50
        warehouseLocations:
          type: array
          items:
            type: object
            properties:
              warehouse:
                type: string
                example: "WH-001"
              quantity:
                type: integer
                example: 45
        updatedAt:
          type: string
          format: date-time

    ReserveRequest:
      type: object
      required:
        - orderId
        - items
      properties:
        orderId:
          type: string
          format: uuid
          description: Unique order ID (used for idempotency)
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1

    ReservationResponse:
      type: object
      required:
        - reservationId
        - orderId
        - items
        - status
        - expiresAt
      properties:
        reservationId:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
                format: uuid
              quantity:
                type: integer
              status:
                type: string
                enum: [pending, committed, released]
        status:
          type: string
          enum: [pending, committed, released]
          description: Reservation state
        expiresAt:
          type: string
          format: date-time
          description: Reservation expiry (typically 30 min from creation)
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - PRODUCT_NOT_FOUND
            - INSUFFICIENT_INVENTORY
            - RESERVATION_EXPIRED
            - INVALID_QUANTITY
            - RESERVATION_NOT_FOUND
          example: INSUFFICIENT_INVENTORY
        message:
          type: string
          example: "Insufficient inventory for product abc123. Available: 10, Requested: 20"
        details:
          type: object
          nullable: true
          properties:
            available:
              type: integer
            requested:
              type: integer

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token with admin role
    ServiceAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Service-to-service JWT token (signed with shared service secret)
